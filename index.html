<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>n8n-splitvideos</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ee;
      --card: #ffffff;
      --text: #1d232a;
      --muted: #5d6772;
      --line: #d8d2c7;
      --accent: #0b6bcb;
    }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #fbfaf7 0%, var(--bg) 100%);
      color: var(--text);
    }
    main {
      max-width: 800px;
      margin: 48px auto;
      padding: 0 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
      padding: 32px;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 2rem;
    }
    p {
      line-height: 1.7;
      color: var(--muted);
    }
    ul {
      margin: 24px 0 0;
      padding-left: 20px;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>n8n-splitvideos</h1>
      <p>Web app for splitting videos into shorter clips and publishing them to TikTok.</p>
      <ul>
        <li><a href="/terms">Terms of Service</a></li>
